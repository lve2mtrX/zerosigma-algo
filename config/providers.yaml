# ZerσSigma Algo Cockpit — provider wiring
#
# Maps each provider role (structure, quotes, execution) to a concrete
# implementation. Implementation classes live in src/providers/*.

structure:
  # SAFE DEFAULT: stub (deterministic mock — no network, no creds).
  # Set ZS_STRUCTURE_PROVIDER=zerosigma_api in .env (with auth creds) to
  # switch to the real read-only provider. Empty / missing → "stub".
  active: "${ZS_STRUCTURE_PROVIDER}"
  default_if_unset: "stub"

  implementations:

    stub:
      module: "src.providers.structure.stub"
      class:  "StubStructureProvider"
      params: {}

    zerosigma_api:
      module: "src.providers.structure.zerosigma_api"
      class:  "ZeroSigmaApiStructureProvider"
      params:
        base_url:          "${ZS_API_BASE_URL}"
        auth_mode:         "${ZS_API_AUTH_MODE}"
        token:             "${ZS_API_TOKEN}"
        username:          "${ZS_API_USERNAME}"
        password:          "${ZS_API_PASSWORD}"
        service_key:       "${ZS_API_SERVICE_KEY}"
        symbol:            "${ZS_PRIMARY_SYMBOL}"
        refresh_seconds:   "${ZS_REFRESH_SECONDS}"
        timeout_seconds:   "${ZS_API_TIMEOUT_SECONDS}"
        verify_ssl:        "${ZS_API_VERIFY_SSL}"
        max_retries:       "${ZS_API_MAX_RETRIES}"
        enable_exposure_series: "${ZS_API_ENABLE_EXPOSURE_SERIES}"
        enable_ddoi:       "${ZS_API_ENABLE_DDOI}"

quotes:
  # SAFE DEFAULT: mock (deterministic synthesized chain — no network, no creds).
  # Set QUOTE_PROVIDER=tastytrade in .env (with TASTY_* OAuth creds) to switch
  # to the live Phase 4 broker provider. Empty / missing → "mock".
  active: "${QUOTE_PROVIDER}"
  default_if_unset: "mock"

  implementations:

    mock:
      module: "src.providers.quotes.mock_provider"
      class:  "MockQuoteProvider"
      params: {}

    null:
      module: "src.providers.quotes.null_provider"
      class:  "NullQuoteProvider"
      params: {}

    # Phase 4 — REST-only Tasty quote provider. Built via .from_env() at
    # runtime through src/providers/quotes/factory.py; the params block here
    # is informational so a reader can see which env vars are consulted.
    # No api_key/api_secret — Tasty uses OAuth refresh-token flow.
    tastytrade:
      module: "src.providers.quotes.tastytrade_provider"
      class:  "TastytradeQuoteProvider"
      params:
        env:                     "${TASTY_ENV}"                # production | certification
        base_url:                "${TASTY_BASE_URL}"            # empty = pick from TASTY_ENV
        oauth_client_id:         "${TASTY_CLIENT_ID}"
        oauth_client_secret:     "${TASTY_CLIENT_SECRET}"
        oauth_refresh_token:     "${TASTY_REFRESH_TOKEN}"
        legacy_session_username: "${TASTY_USERNAME}"            # fallback only
        legacy_session_password: "${TASTY_PASSWORD}"
        account_number:          "${TASTY_ACCOUNT_NUMBER}"
        # Quote-validation thresholds — applied per quote inside the provider.
        quote_max_age_seconds:   "${TASTY_QUOTE_MAX_AGE_SECONDS}"
        quote_max_spread_pct:    "${TASTY_QUOTE_MAX_SPREAD_PCT}"
        quote_max_spread_abs:    "${TASTY_QUOTE_MAX_SPREAD_ABS}"
        reject_zero_bid:         "${TASTY_REJECT_ZERO_BID}"
        reject_crossed_market:   "${TASTY_REJECT_CROSSED_MARKET}"

execution:
  # Allowed Phase 1 modes: disabled | local_paper | manual_trade_tracking
  # Future modes:          broker_paper | manual_confirm | live_tiny | live
  active: "${EXECUTION_MODE}"
  default_if_unset: "local_paper"

  implementations:

    disabled:
      module: "src.providers.execution.disabled"
      class:  "DisabledExecutionProvider"
      params: {}

    local_paper:
      module: "src.providers.execution.local_paper"
      class:  "LocalPaperExecutionProvider"
      params:
        fill_at:         "mid"        # "mid" | "mark_or_manual" | "natural" (future)
        slippage_per_leg: 0.02
        commissions_per_contract: 0.65

    manual_trade_tracking:
      module: "src.providers.execution.manual_tracker"
      class:  "ManualTrackerExecutionProvider"
      params: {}

    # ── future modes ─ stubbed in Phase 1, raise NotImplementedError ──
    broker_paper:
      module: "src.providers.execution.broker_paper"
      class:  "BrokerPaperExecutionProvider"
      params: {}

    manual_confirm:
      module: "src.providers.execution.manual_confirm"
      class:  "ManualConfirmExecutionProvider"
      params: {}

    live_tiny:
      module: "src.providers.execution.live"
      class:  "LiveExecutionProvider"
      params:
        max_contracts: 1
        require_double_confirmation: true

    live:
      module: "src.providers.execution.live"
      class:  "LiveExecutionProvider"
      params:
        require_double_confirmation: true
