# ZerσSigma Algo Cockpit — scanner config
#
# Global scan loop settings (cadences + windows). Strategy-specific knobs live
# in config/strategies.yaml; risk-specific knobs in config/risk_profiles.yaml.

scanner:
  # Loop cadences (seconds)
  cadences:
    structure_refresh: 60      # ZS API /market/snapshot poll
    series_refresh:    60      # ZS API /exposure/series poll (per metric)
    quote_refresh:     5       # broker spot poll (future; null in Phase 1)
    candidate_rebuild: 10      # how often to recompute candidates from cached snapshot
    decision_log_flush: 10     # how often to fsync the JSONL log

  # Universal scan window (ET). Per-profile windows in risk_profiles.yaml.
  market_session:
    open:  "09:30"
    close: "16:00"
    timezone: "America/New_York"

  # Symbols to scan (Phase 1: SPX only)
  symbols: ["SPX"]

  # Per-symbol overrides if needed later
  per_symbol_overrides: {}

  # Polling guardrails — protect against API rate limits
  rate_limit_safety:
    structure_min_interval_seconds: 30   # never poll structure faster than this
    series_min_interval_seconds:    30
    quote_min_interval_seconds:      1

  # Replay (Phase 1: disabled). When enabled, the scanner pulls snapshots
  # from a local archive instead of the live API.
  replay:
    enabled: false
    source_dir: "./data/replay"
    speed_multiplier: 1.0
    date_range:
      start: null
      end:   null

  # On startup, fetch these once (instead of every tick)
  warmup:
    fetch_prev_wings: true
    fetch_ddoi_history: true
    fetch_es_factor: true

  # Phase 4.1 — Target-DTE expiry selection. Default keeps today's behavior
  # (target_dte=0 = today). CLI > env > YAML > default. After-hours roll
  # advances by ONE day when target_dte=0 AND past after_hours_cutoff_et.
  # See src/utils/expiry.py and docs/reference_notes.md.
  expiry:
    target_dte: 0
    dte_mode: trading_days          # calendar_days | trading_days
    allow_after_hours_roll: false
    after_hours_cutoff_et: "16:00"   # ET; default = market close
    # Phase 4.2 — when true, a target_dte the broker chain can't serve (only a
    # fallback expiry exists) forces NO_TRADE instead of silently trading the
    # fallback. CLI --strict-target-dte > STRICT_TARGET_DTE env > this > false.
    # Default false = today's lax fallback behavior.
    strict_target_dte: false

  # Phase 5 — Daily trade selector. SELECTION ONLY (no execution). Chooses at
  # most `max_trades_per_day` candidate(s) from the already-generated, scored,
  # filtered candidates. CLI > env > YAML > default. See src/selector/
  # daily_selector.py. Modes: score_best_valid | best_credit_valid |
  # closest_wing_valid | farthest_wing_valid | call_credit_only |
  # put_credit_only | lowest_breach_risk_valid | regime_aligned_valid | no_trade
  selector:
    daily_trade_selector: score_best_valid    # backward-safe default
    max_trades_per_day: 1
    allow_call_credit: true
    allow_put_credit: true
    require_selector_eligible_base: true
    require_quote_validation: true
    require_score_edge: false
    no_trade_on_selector_conflict: true
    # Optional thresholds — leave blank/omit for "no filter".
    min_selector_score:
    min_selector_credit:
    min_selector_distance_from_spot:
    max_selector_distance_from_spot:
    # lowest_breach_risk_valid transparent composite weights.
    lowest_breach_risk_distance_weight: 1.0
    lowest_breach_risk_credit_weight: 0.25
    lowest_breach_risk_risk_weight: 1.0
